apiVersion: apps/v1
kind: Deployment
metadata:
  name: cryptotelemetry
  namespace: monitoring
  labels:
    app: cryptotelemetry
  annotations:
    keel.sh/policy: minor
    keel.sh/trigger: poll
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cryptotelemetry
  template:
    metadata:
      labels:
        app: cryptotelemetry
    spec:
      imagePullSecrets:
        - name: gitpullsecret
      containers:
      - name: cryptotelemetry
        image: git.ryzen.me/ryzen/cryptotelemetry:latest
        env:
          - name: OTEL_SERVICE_NAME
            value: cryptotelemetry
          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: http://vlsingle-vlsingle:9428
          - name: OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED
            value: "true"
          - name: TIMEOUT
            value: "15"
          - name: CURRENCY
            value: USD
          - name: LEVEL
            value: "20"
          - name: COIN_BTC_ID
            value: bitcoin
          - name: COIN_LTC_ID
            value: litecoin
          - name: COIN_XRP_ID
            value: ripple
          - name: COIN_ETH_ID
            value: ethereum
